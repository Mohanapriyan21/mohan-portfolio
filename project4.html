<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

    <!-- ✅ PARTICLES -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }

        /* PARTICLE BACKGROUND */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0f172a;
        }

        /* OVERLAY */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* Custom Cursor */
        .custom-cursor {
            width: 30px;
            height: 30px;
            border: 2px solid #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            transition: 0.1s;
        }

        .custom-cursor.hover {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.7);
        }

        nav a:hover {
            color: #ffcc00;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 80px;
        }

        .content-container img {
            width: 80%;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .content-container p {
            margin-top: 20px;
            font-size: 1.2rem;
            color: white;
            text-align: center;
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
        }

        .theme-toggle i {
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>

    <!-- PARTICLES -->
    <div id="particles-js"></div>
    <div class="overlay"></div>

    <!-- Cursor -->
    <div class="custom-cursor"></div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="theme-toggle">
        <i class="fas fa-moon"></i>
    </div>

    <!-- NAV -->
    <nav class="py-4">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="text-white text-2xl font-bold flex items-center">
                <i class="fas fa-gamepad mr-2"></i>
                Mohan Portfolio
            </a>
            <ul class="flex space-x-4">
                <li><a href="index.html#projects" class="text-white">Projects</a></li>
                <li><a href="index.html#about" class="text-white">About</a></li>
                <li><a href="index.html#contact" class="text-white">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mx-auto py-10">
        <h1 class="text-4xl text-white font-bold text-center mb-10">Invisible</h1>

        <div class="content-container">
            <img src="photos/3d game/ws 3d.jpg">
            <p>Main Menu</p>
        </div>

        <div class="content-container">
            <img src="photos/3d game/Lvl 3d.jpg">
            <p>Simple UI screen for Level</p>
        </div>

        <div class="content-container">
            <img src="photos/3d game/lvl1 3d.jpg">
            <p>Collect invisible coins to complete level</p>
        </div>

        <div class="content-container">
            <img src="photos/3d game/gm 3d.jpg">
            <p>Different level designs</p>
        </div>

        <div class="content-container">
            <img src="photos/3d game/lv 3d.jpg">
            <p>Invisible objects visible through special device</p>
        </div>

        <div class="content-container">
            <img src="photos/3d game/ps 3d.jpg">
            <p>Pause Menu</p>
        </div>

        <div class="content-container">
            <img src="photos/3d game/go 3d.jpg">
            <p>Game Over</p>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="bg-yellow-400 text-black py-2 px-6 rounded-full">
                Back to Portfolio
            </a>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-gray-800 py-4 text-white text-center">
        &copy; 2025 MOHAN GameDev Portfolio
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

    <script>
        AOS.init();

        // Cursor
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a,button').forEach(el=>{
            el.addEventListener('mouseenter',()=>cursor.classList.add('hover'));
            el.addEventListener('mouseleave',()=>cursor.classList.remove('hover'));
        });

        // Theme Toggle
        const toggle = document.getElementById('theme-toggle');
        toggle.onclick = () => {
            document.body.classList.toggle('dark-theme');
        };

        // PARTICLES
        particlesJS("particles-js", {
            particles: {
                number: { value: 80 },
                size: { value: 3 },
                move: { speed: 2 },
                line_linked: { enable: true },
                color: { value: "#ffffff" }
            }
        });
    </script>

</body>
</html>
